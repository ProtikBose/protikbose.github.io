<nav id="page-nav" class="d-none d-lg-block">
    <ul>
        <li><a href="#about" data-target="about"><span class="dot"></span><span class="label">About</span></a></li>
        {% if site.data.display.homepage.show_experience %}
        <li><a href="#experience" data-target="experience"><span class="dot"></span><span class="label">Experience</span></a></li>
        {% endif %}
        {% if site.data.display.homepage.show_news %}
        <li><a href="#news" data-target="news"><span class="dot"></span><span class="label">News</span></a></li>
        {% endif %}
        {% if site.data.display.homepage.show_selected_publications %}
        <li><a href="#publications" data-target="publications"><span class="dot"></span><span class="label">Publications</span></a></li>
        {% endif %}
    </ul>
</nav>

<style>
#page-nav {
    position: fixed;
    top: 50%;
    right: 20px;
    transform: translateY(-50%);
    z-index: 100;
}

#page-nav ul {
    list-style: none;
    padding: 0;
    margin: 0;
}

#page-nav li {
    margin: 12px 0;
}

#page-nav a {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    text-decoration: none;
    color: #999;
    transition: color 0.2s ease;
}

#page-nav a:hover {
    color: #333;
}

#page-nav .dot {
    display: inline-block;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: #ccc;
    margin-left: 10px;
    transition: background 0.2s ease, transform 0.2s ease;
    order: 2;
}

#page-nav .label {
    font-size: 0.85rem;
    margin-right: 10px;
    order: 1;
    white-space: nowrap;
    color: #999;
    transition: color 0.2s ease;
}

#page-nav a:hover .label,
#page-nav a.active .label {
    color: #333;
    font-weight: 500;
}

#page-nav a:hover .dot,
#page-nav a.active .dot {
    background: #333;
    transform: scale(1.3);
}

html {
    scroll-behavior: smooth;
}

section[id] {
    scroll-margin-top: 20px;
}
</style>

<script>
(function() {
    const links = document.querySelectorAll('#page-nav a');
    const sections = Array.from(links).map(link => {
        const id = link.getAttribute('data-target');
        return document.getElementById(id);
    }).filter(Boolean);

    function updateActive() {
        const scrollPos = window.scrollY + 150;
        let current = sections[0];
        sections.forEach(section => {
            if (section.offsetTop <= scrollPos) {
                current = section;
            }
        });
        links.forEach(link => {
            link.classList.toggle('active', link.getAttribute('data-target') === current.id);
        });
    }

    window.addEventListener('scroll', updateActive);
    updateActive();
})();
</script>
