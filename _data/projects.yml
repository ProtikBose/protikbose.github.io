- title: "Reservoir Dynamics and Hydrological Impacts in the GBMIM Basin"
  # period: "2024 – Present"
  # venue: "ShaDE Lab, Arizona State University"
  description: >-
    A basin-scale, satellite-based assessment of reservoir behavior and
    downstream hydrological impacts across the Ganges-Brahmaputra-Meghna-Indus-Mekong (GBMIM)
    river system. The project builds a 30-year monthly storage time series for
    more than <b>1,600 reservoirs</b>, pairs each with its upstream catchment and
    GLDAS-derived hydroclimatic fluxes, and quantifies a <b>Reservoir Impact
    Factor (RIF)</b> to characterize how dams alter downstream flow. An
    interactive web portal makes the results explorable for researchers and
    water-resource decision-makers — see the live project website
    <a href="https://protikbose.github.io/gbmim-basin-explorer/" target="_blank" rel="noopener" class="teal-text hoverline">here</a>.
  image: assets/images/projects/river.png
  tags:
    - Hydrology
    - Remote Sensing
    - Transboundary Rivers
    - Geospatial Analysis
    - Dashboard
  links:
    - name: "Live Project · GBMIM Basin Explorer"
      url: "https://protikbose.github.io/gbmim-basin-explorer/"
      icon: fas fa-globe

