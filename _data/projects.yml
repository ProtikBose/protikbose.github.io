- title: "LiDAR-Based Urban Tree Mapping"
  # period: "2024 – Present"
  # venue: "ShaDE Lab, Arizona State University"
  description: >-
    An automated pipeline using LiDAR and ML to create a detailed and georeferenced
    tree inventory. LiDAR data is classified with NDVI, building, and land-cover
    layers, followed by individual tree segmentation via GDAL polygonization, clustering 
    and SAMGeo. Morphological metrics are computed per tree,
    and trees are classified into <i>mesic</i> and <i>xeric</i> types.
  image: assets/images/projects/tree_mapping.png
  tags:
    - LiDAR
    - ML
    - Statistical Analysis
    - Urban Ecology
    - Remote Sensing
  links:
    - name: "Poster · CAPLTER Annual Event 2026"
      url: "https://globalfutures.asu.edu/caplter/wp-content/uploads/sites/33/2026/02/Protik_CAPLTER-1.pdf"
      icon: fas fa-image
    - name: "CAP-LTER Graduate Grant (NSF-funded)"
      url: "https://globalfutures.asu.edu/caplter/awarded-grad-grants/"
      icon: fas fa-trophy

