- title: "Satire and Misinformation Detection"
  # period: "2022 – 2024"
  # venue: "BUET · CISPA · ASU collaborators"
  description: >-
    Developed and evaluated ML models — from traditional classifiers to
    transformer-based models (BERT, XLM-RoBERTa) — for fake and misleading news
    detection across multiple domains. SVM achieved <b>86%</b> on small datasets;
    novel text-augmentation strategies pushed XLM-RoBERTa to <b>97%</b>. BERT
    applied to Bengali misinformation yielded a <b>97% F1-score</b>.
  image: assets/images/projects/misinformation.png
  tags:
    - NLP
    - Transformers
    - Misinformation
    - Low-resource Languages
  links:
