- title: "Urban Accessibility Research"
  # period: "2025"
  # venue: "Independent research"
  description: >-
    Investigating how access to essential urban amenities is distributed across 
    socio-economic and environmental lines. One line of work maps cultural hubs and 
    deserts across New York City and develops a <b>Socio-Cultural Accessibility Score</b> to 
    identify underserved and overserved regions. A parallel line examines whether low-income residents living in the hottest census tracts 
    have meaningful access to public cooling centers during extreme-heat events.
  image: assets/images/projects/accessibility.png
  tags:
    - Urban AI
    - GeoAI
    - Explainable AI
    - Geospatial Analysis
    - Urban Mobility
  links:
    - name: "Paper · Urban AI (ACM SIGSPATIAL) 2025"
      url: "https://dl.acm.org/doi/abs/10.1145/3764926.3771943"   # TODO: replace with paper / DOI URL
      icon: fas fa-file-pdf
    - name: "Runners-up · SpaceHACK for Sustainability 2025"
