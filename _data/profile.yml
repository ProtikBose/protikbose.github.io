short_bio: >-
  <p>
    I am a PhD student in the Department of Computer Science at <a href="https://www.asu.edu/" target="_blank"
    class="teal-text hoverline"><b>Arizona State University</b></a> and Graduate Student Assistant in the <a href="https://shadelab.asu.edu/" target="_blank"
    class="teal-text hoverline"><b>ShaDE Lab</b></a> (advised by <a href="https://search.asu.edu/profile/854979/" target="_blank"
    class="teal-text hoverline"><b>Dr. Ariane Middel</b></a>).
  </p>    
  <p>
    My research sits at the intersection of geospatial machine learning (GeoAI), urban informatics, and remote sensing, with the goal of enabling more climate-resilient and equitable urban planning. I build end-to-end mapping pipelines that fuse imagery (e.g., NAIP), LiDAR, and open geospatial data to create actionable layers such as pedestrian infrastructure networks and city-scale tree inventories. 
    Using statistical, spatial, and AI-driven models, I quantify extreme-heat exposure and evaluate how vegetation structure and shade influence pedestrian comfort and neighborhood-scale inequities. More broadly, I enjoy translating core machine learning ideas into scalable, real-world systems that produce tangible decision-support tools for cities.
  </p>
  <p>
    I have received my B.Sc (Engg.) in Computer Science and Engineering from <a href="https://www.buet.ac.bd/web/#/" target="_blank"
    class="teal-text hoverline"><b>Bangladesh University of Engineering and Technology(BUET)</b></a>. I completed my undergraduate thesis under the supervision of Professor <a href="http://saidurrahman.buet.ac.bd/" target="_blank"
    class="teal-text hoverline"><b>Dr. Md. Saidur Rahman</b></a> on Graph Theory and Algorithms.

  </p>

  <p>
    You can find my <a href="/assets/resume/resume.pdf" target="_blank" class="teal-text hoverline"><b>Resume</b></a> and <a href="/assets/resume/cv.pdf" target="_blank" class="teal-text hoverline"><b>CV</b></a> here.
  </p>

