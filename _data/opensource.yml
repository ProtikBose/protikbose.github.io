# =====================================================================
# Open Source
# ---------------------------------------------------------------------
# Three sections: datasets, dashboards, code/repos.
# Order in each list = display order (newest / most-relevant first).
#
# Common fields:
#   title       : (required) Name of the artifact
#   description : (required) 1–3 sentence summary
#   tags        : (optional) list of short keywords -> pills
#   year        : (optional) "2025" or "2024 – Present"
#   image       : (optional) preview image path, e.g. assets/images/opensource/foo.png
#                 Omit / leave blank for text-only card.
#   links       : (optional) list of related links. Each:
#                   name : button label
#                   url  : full URL
#                   icon : (optional) Font Awesome class
#
# Suggested icons:
#   fab fa-github          GitHub repository
#   fas fa-globe           live website / dashboard
#   fas fa-database        dataset download / data portal
#   fas fa-file-pdf        paper / docs PDF
#   fas fa-book            documentation
#   fas fa-play            demo video
#   fas fa-cube            package (PyPI / npm)
#   fas fa-newspaper       blog post / write-up
# =====================================================================


# ---------------------------------------------------------------------
# DATASETS
# ---------------------------------------------------------------------
# Datasets you have published, contributed to, or maintained.
datasets:
  - title: "Hourly Mean Radiant Temperature Distribution on a Summer Day, Maricopa County, Arizona, USA"
    year: "2026"
    description: >-
      This dataset is a collection of 1-m resolution mean radiant temperature (Tmrt) rasters generated using digital surface models and the Solar and longwave environmental irradiance geometry (SOLWEIG) model. The dataset provides hourly Tmrt covering Maricopa County, Arizona (USA) metropolitan area for one of the hottest days in the summer of 2023.
    tags:
      - SOLWEIG
      - Remote Sensing
      - Thermal Comfort
    image:   # assets/images/opensource/example-dataset.png
    links:
      - name: "Download"
        url: "10.6073/pasta/300ddb6879bab8a5e0208f6df3ed2cc0"
        icon: "fas fa-database"
      # - name: "Repository"
      #   url: "https://github.com/ProtikBose/example-dataset"
      #   icon: "fab fa-github"
      # - name: "Paper"
      #   url: "#"
      #   icon: "fas fa-file-pdf"


# ---------------------------------------------------------------------
# DASHBOARDS
# ---------------------------------------------------------------------
# Interactive web tools, visualizations, decision-support portals.
dashboards:
  - title: "GBM Basin Explorer"
    #year: "2025 – Present"
    description: >-
      Interactive dashboard for the Ganges–Brahmaputra–Meghna basin reservoir
      study. Visualizes 30-year storage time series for 1,600+ reservoirs,
      upstream catchment polygons, hydroclimatic fluxes, and the computed
      Reservoir Impact Factor (RIF). Built for both researchers and water-resource
      decision-makers.
    tags:
      - Hydrology
      - GIS
      - Transboundary Rivers
    image:   # assets/images/opensource/gbm-basin.png
    links:
      - name: "Live Dashboard"
        url: "https://protikbose.github.io/gbmim-basin-explorer/"
        icon: "fas fa-globe"
      - name: "Source"
        url: "#"   # TODO: GitHub repo URL if public
        icon: "fab fa-github"

  - title: "Phoenix Walkability Weather Risk"
    #year: "2025 – Present"
    description: >-
      A live tracker reporting <b>feels-like temperature</b> (heat + humidity +
      sun + wind) in Phoenix, AZ and classifying conditions into walkability
      risk tiers. Auto-updates every 3 hours via GitHub Actions using
      Open-Meteo data — because a sidewalk is only useful when the climate
      allows people to walk.
    tags:
      - Urban Climate
      - Live Data
      - Walkability
    image:   # assets/images/opensource/walkability-weather.png
    links:
      - name: "Latest conditions"
        url: "https://github.com/ProtikBose/ProtikBose/blob/master/walkability_weather.md"
        icon: "fas fa-globe"
      - name: "Source"
        url: "https://github.com/ProtikBose/ProtikBose"
        icon: "fab fa-github"


# ---------------------------------------------------------------------
# CODE & REPOSITORIES
# ---------------------------------------------------------------------
# Reusable code, frameworks, scripts, libraries.
repos:
  - title: "GBM-Reservoir-Dynamics"
    #year: "2025 – Present"
    description: >-
      Watershed delineation pipeline for the Ganges–Brahmaputra–Meghna basin
      reservoir study. Performs fast watershed delineation for outlet points
      anywhere on Earth using MERIT-Hydro / MERIT-Basins vector data, with
      optional high-resolution raster-based delineation. Also extracts
      <b>upstream</b> and <b>downstream</b> river paths for each outlet and
      produces interactive HTML map viewers.
    tags:
      - Python
      - Hydrology
      - MERIT-Hydro
      - GIS
    image:   # assets/images/opensource/gbm-reservoir-dynamics.png
    links:
      - name: "GitHub"
        url: "https://github.com/ProtikBose/GBM-Reservoir-Dynamics"
        icon: "fab fa-github"
 
  - title: "Vasha-Sikkha"
    #year: "2020"
    description: >-
      An interactive Flutter mobile app for learning English. Users practice
      speaking, reading, listening, and writing through lessons of progressively
      harder tasks — fill-in-the-blanks, sentence matching, MCQs, crossword
      puzzles, jumbled sentences, and a memory game. User scores are saved to
      a backend database with a combined leaderboard across all users.
    tags:
      - Flutter
      - Dart
      - Mobile App
      - EdTech
    image:   # assets/images/opensource/vasha-sikkha.png
    links:
      - name: "GitHub"
        url: "https://github.com/ProtikBose/Vasha-Sikkha"
        icon: "fab fa-github"
 
  - title: "Gesture-Sensed Snake Game"
    #year: "2019"
    description: >-
      A classic snake game built on an Atmega32 microcontroller and controlled
      by hand gestures via an accelerometer sensor instead of buttons.
      An embedded-systems project exploring real-time sensor input,
      microcontroller programming in C, and gesture-based interaction.
    tags:
      - Embedded
      - C
      - Atmega32
      - Accelerometer
    image:   # assets/images/opensource/gesture-snake.png
    links:
      - name: "GitHub"
        url: "https://github.com/ProtikBose/Gesture-Sensed-Snake-Game"
        icon: "fab fa-github"