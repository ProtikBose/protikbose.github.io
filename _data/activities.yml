    course: "CSE 100 — Principles of Programming with C++"
    description: "Programming concepts, problem-solving, and program design."
    icon: "fas fa-chalkboard-user"
 
  - role: "Teaching Assistant"
    course: "CSE 360 — Introduction to Software Engineering"
    description: "Software engineering principles such as life-cycle models, development methods, UML, project management, testing, and quality-assurance standards."
    icon: "fas fa-chalkboard-user"
 
  - role: "Teaching Assistant"
    course: "CSE 467 — Data and Information Security"
    description: "Introductory understanding of the technical and behavioral mechanisms for information security and privacy."
    icon: "fas fa-chalkboard-user"
 
  - role: "Teaching Assistant"
    course: "CSE 470 — Computer Graphics"
    description: "Basic concepts of interactive computer graphics, realistic rendering, and 3-D viewing."
    icon: "fas fa-chalkboard-user"
 
  - role: "Teaching Assistant"
    course: "CSE 477 — Introduction to Computer-Aided Geometric Design"
    description: "Basic concepts of 3-D computer geometry, including curves, surfaces, and meshes."
    icon: "fas fa-chalkboard-user"
 
  - role: "Teaching Assistant"
    course: "CSE 485 — ASU Capstone Project"
    description: "Project-based course linking students with industry- and faculty-sponsored projects, cultivating practical experience and preparing them for the professional world."
    icon: "fas fa-chalkboard-user"