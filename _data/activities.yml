#   year   : (required) "2025" or "2024 - Present"
#   title  : (required) headline / award name
#   detail : (optional) one-line context (issuer, venue, role, etc.)
#   note   : (optional) extra text shown after the detail
#   url    : (optional) link rendered as [link] — leave "#" for no link
#   icon   : (optional) Font Awesome class shown before the title
#
# Leadership and Service use:
#   role   : (required) "Coordinator", "Reviewer", etc.
#   venue  : (required) organization / event
# =====================================================================


